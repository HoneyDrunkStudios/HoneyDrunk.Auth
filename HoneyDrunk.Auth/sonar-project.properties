# SonarQube Cloud project configuration for HoneyDrunk.Auth.
# Project imported via the SonarQube Cloud GitHub App; quality gate runs in
# job-sonarcloud.yml (HoneyDrunk.Actions) on every pull request to main.
# Post-merge analysis on `push` to `main` is deferred (cost discipline per
# ADR-0011 D11 + D6); the upstream job-sonarcloud.yml supports both event
# types if push-time analysis is ever wanted.
#
# This file lives at HoneyDrunk.Auth/sonar-project.properties (inside the
# inner project subdir, next to HoneyDrunk.Auth.slnx). All sonar.sources /
# sonar.tests paths are relative to this subdir, which matches the
# working-directory the reusable job-sonarcloud.yml runs from.

sonar.organization=honeydrunkstudios
sonar.projectKey=honeydrunkstudios_HoneyDrunk.Auth
sonar.projectName=HoneyDrunk.Auth

# Sources — runtime + Abstractions + AspNetCore integration
sonar.sources=HoneyDrunk.Auth,HoneyDrunk.Auth.Abstractions,HoneyDrunk.Auth.AspNetCore

# Tests — main test project plus the Canary cross-Node verification project
sonar.tests=HoneyDrunk.Auth.Tests,HoneyDrunk.Auth.Canary

# Coverage (consumed by job-sonarcloud.yml after Cobertura → OpenCover conversion)
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Exclusions — generated code and build outputs
sonar.exclusions=**/obj/**,**/bin/**,**/*.Designer.cs

# No coverage exclusions — HoneyDrunk.Auth.Abstractions contains concrete types
# with logic (AuthCredential, AuthenticationResult, AuthorizationRequest), not
# interface-only stubs. Let Sonar measure them. Use [ExcludeFromCodeCoverage]
# attributes in code for surgical exclusions if specific types need to be skipped.

